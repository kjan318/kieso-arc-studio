            color: var(--brand-text);

            overflow: hidden;

            transition: background-color 0.3s ease, color 0.3s ease;

            background-color: var(--brand-card);
            border: 1px solid var(--brand-border);
            border-radius: 1.25rem;

            transition: all 0.2s ease;
        }

            background-color: var(--brand-card-light);
            transform: translateY(-2px);
        }

        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

            width: 5px;
            height: 5px;
        }

            background: transparent;
        }

            background: var(--brand-border);
            border-radius: 10px;
        }

        .nav-active {
            background-color: var(--brand-border);
            color: var(--brand-text);
        }

        .nav-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 4px;
            background-color: var(--brand-accent);
            border-radius: 0 4px 4px 0;
        }

        .highlight-match {
            background-color: rgba(110, 231, 183, 0.3);
            border-radius: 2px;
            padding: 0 2px;
        }

        .view-list .kpi-grid {
            display: flex;
            flex-direction: column;

        .view-list .kpi-card {
            flex-direction: row;
            align-items: center;
            padding: 1rem 1.5rem;
            height: auto;
        }

        .view-list .kpi-card > div:first-child {
            flex: 1;
            margin-bottom: 0;
        }

        .view-list .kpi-card .purpose-text {
            display: none;
        }

        .view-list .kpi-card .details-section {
            display: none;
        }

        .view-list .kpi-card .status-tag {

            border: none;
            padding: 0;

                { name: 'Inclusion Index', type: 'Experience', isPlanned: true, purpose: 'Degree of belonging and voice. Direct driver of retention and innovation.', formula: 'Avg agreement score on belonging questions.', prereqs: 'Survey: Inclusion-focused module' }
            ]},
            { id: 'hr-operations', title: 'HR Ops & Service Delivery', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z', theme: 9, kpis: [
                { name: 'HR Process Automation Rate', type: 'Operational', isPlanned: true, purpose: 'Operational maturity. Reduces manual error and increases scalability.', formula: '(Automated Processes / Total Processes) * 100', prereqs: 'Process Inventory Audit' },
                { name: 'HR Ticket Resolution Time', type: 'Operational', isPlanned: true, purpose: 'Efficiency and responsiveness. Long times damage employee perception.', formula: 'Avg(Resolution_Date - Creation_Date)', prereqs: 'HR Ticketing System Data' },
                { name: 'HRIS Self-Service Adoption', type: 'Experience', isPlanned: true, purpose: 'Effectiveness of self-service. Reduces HR administrative burden.', formula: '(Active Self-Service Users / Total Employees) * 100', prereqs: 'HRIS: Login/Activity Logs' }
            ]},
            { id: 'future-of-work', title: 'Future of Work & Risk', icon: 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z', theme: 10, kpis: [
                { name: 'Remote/Hybrid Effectiveness', type: 'Strategic', isPlanned: true, purpose: 'Assesses sustainability by comparing perf/engagement by location.', formula: 'Perf/Engagement segmented by Location.', prereqs: 'HRIS + Performance + Survey Data' },
                { name: 'Mandatory Training Compliance Rate', type: 'Operational', isPlanned: true, purpose: 'Adherence to legal/safety training. Rates < 100% signal high risk.', formula: '(Completed / Total Employees) * 100', prereqs: 'LMS: Training Tracking' },
                { name: 'Data Accuracy Rate', type: 'Operational', isPlanned: true, purpose: 'Reliability of core HRIS data. Foundation for all other analytics.', formula: '(Accurate Records / Total Audited) * 100', prereqs: 'Formal HRIS Audit Results' }
            ]}
        ];

        const sidebarNav = document.getElementById('sidebarNav');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const viewGridBtn = document.getElementById('viewGrid');
        const viewListBtn = document.getElementById('viewList');
        const searchInput = document.getElementById('kpiSearch');

        function renderFramework(term = '') {
            sidebarNav.innerHTML = '';
            sectionsContainer.innerHTML = '';

            kpiData.forEach(theme => {
                const visibleKpis = theme.kpis.filter(kpi => 
                    kpi.name.toLowerCase().includes(term.toLowerCase()) || 
                    kpi.purpose.toLowerCase().includes(term.toLowerCase())
                );

                if (term !== '' && visibleKpis.length === 0) return;

                // Sidebar Icons with KPI count
                const navItem = document.createElement('div');
                navItem.className = `w-12 h-12 flex items-center justify-center cursor-pointer text-brand-muted hover:text-brand-text transition-all rounded-xl relative group theme-nav-item`;
                navItem.setAttribute('data-id', theme.id);
                navItem.innerHTML = `
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="${theme.icon}" />
                    </svg>
                    <div class="absolute -top-1 -right-1 bg-brand-border text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center tabular-nums border border-brand-card">
                        ${theme.kpis.length}
                    </div>
                    <div class="absolute left-16 bg-brand-card border border-brand-border px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none text-xs font-bold shadow-xl">
                        ${theme.title}
                    </div>
                `;
                navItem.onclick = () => document.getElementById(theme.id).scrollIntoView({ behavior: 'smooth' });
                sidebarNav.appendChild(navItem);

                // Section Content
                const section = document.createElement('div');
                section.id = theme.id;
                section.className = 'scroll-mt-24';

                const kpisHtml = theme.kpis.map(kpi => {
                    const isVisible = visibleKpis.includes(kpi);
                    const highlight = (text) => term ? text.replace(new RegExp(term, 'gi'), match => `<span class="highlight-match">${match}</span>`) : text;

                    return `
                    <div class="glass-panel p-6 flex flex-col justify-between kpi-card relative overflow-hidden group/card ${isVisible ? '' : 'hidden'}">
                        ${kpi.isLive ? `
                            <div class="status-tag absolute top-0 right-0 bg-brand-accent/10 border-l border-b border-brand-accent/20 px-3 py-1 rounded-bl-xl z-10">
                                <span class="text-[9px] font-black uppercase tracking-widest text-brand-accent">Live on TA Dashboard</span>
                            </div>
                        ` : ''}
                        ${kpi.isPlanned ? `
                            <div class="status-tag absolute top-0 right-0 bg-brand-cyan/10 border-l border-b border-brand-cyan/20 px-3 py-1 rounded-bl-xl z-10">
                                <span class="text-[9px] font-black uppercase tracking-widest text-brand-cyan">Planned for Suite</span>
                            </div>
                        ` : ''}
                        <div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="text-[10px] font-black uppercase tracking-[0.2em] text-brand-muted">Strategic KPI</div>
                                <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase bg-brand-cardLight border border-brand-border text-brand-muted">${kpi.type}</span>
                            </div>
                            <h3 class="text-xl font-bold mb-3 group-hover/card:text-brand-accent transition-colors">${highlight(kpi.name)}</h3>
                            <p class="purpose-text text-xs text-brand-muted leading-relaxed mb-6 font-medium">${highlight(kpi.purpose)}</p>
                        </div>
                        <div class="details-section space-y-4 pt-4 border-t border-brand-border">
                            <div>
                                <span class="text-[9px] font-black uppercase tracking-widest text-brand-muted block mb-2">Logic Model</span>
                                <div class="bg-brand-bg/50 px-3 py-2 rounded-lg text-[11px] font-mono border border-brand-border/50 text-brand-cyan">${highlight(kpi.formula)}</div>
                            </div>
                            <div>
                                <span class="text-[9px] font-black uppercase tracking-widest text-brand-muted block mb-2">Data Integrity Requirements</span>
                                <div class="text-[10px] font-bold text-brand-text opacity-80">${kpi.prereqs}</div>
                            </div>
                        </div>
                    </div>
                `}).join('');

                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 rounded-2xl bg-brand-cardLight border border-brand-border flex items-center justify-center">
                            <svg class="w-6 h-6 text-brand-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="${theme.icon}" />
                            </svg>
                        </div>
                        <h2 class="text-2xl font-black">${theme.title}</h2>
                    </div>
                    <div class="kpi-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${kpisHtml}
                    </div>
                `;
                sectionsContainer.appendChild(section);
            });
        }

        // View Toggle Logic
        viewGridBtn.addEventListener('click', () => {
            document.getElementById('frameworkContent').classList.remove('view-list');
            viewGridBtn.classList.add('bg-brand-card', 'text-brand-accent');
            viewListBtn.classList.remove('bg-brand-card', 'text-brand-accent');
            viewListBtn.classList.add('text-brand-muted');
        });

        viewListBtn.addEventListener('click', () => {
            document.getElementById('frameworkContent').classList.add('view-list');
            viewListBtn.classList.add('bg-brand-card', 'text-brand-accent');
            viewGridBtn.classList.remove('bg-brand-card', 'text-brand-accent');
            viewGridBtn.classList.add('text-brand-muted');
        });

        // Initial Render
        renderFramework();

        // Theme Toggle logic
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') body.classList.remove('dark');
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        });

        // Search logic
        searchInput.addEventListener('input', (e) => {
            renderFramework(e.target.value);
        });

        // Scrollspy for Sidebar
        const mainContentArea = document.getElementById('frameworkContent');
        mainContentArea.addEventListener('scroll', () => {
            let current = '';
            document.querySelectorAll('.scroll-mt-24').forEach(section => {
                if (mainContentArea.scrollTop >= (section.offsetTop - 120)) {
                    current = section.getAttribute('id');
                }
            });

            document.querySelectorAll('.theme-nav-item').forEach(item => {
                item.classList.remove('nav-active');
                if (item.getAttribute('data-id') === current) {
                    item.classList.add('nav-active');
                }
            });
        });
    </script>
</body>

</html>
